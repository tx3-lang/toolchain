name: DX E2E

# Validates the DX of assembled toolchain channels. A `discover` job builds the
# {os × channel × journey} matrix, filtering out combinations whose channel can't
# satisfy a journey's declared `#@ min-tx3c` (so e.g. the tuple-using lang-tour
# journey only runs on channels with tx3c >= 0.22). Native matrix only — a DX test
# must exercise the real per-platform install, which a Linux container can't.

on:
  push:
    branches: [main]
    paths:
      - 'manifest-*.json'
      - 'e2e/**'
      - 'scripts/dx-e2e-matrix.sh'
      - '.github/workflows/dx-e2e.yml'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel(s) to test, space-separated (blank = default set)'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 7 * * *'          # nightly drift check

permissions:
  contents: read

env:
  DEFAULT_CHANNELS: 'stable beta'
  OSES: 'ubuntu-latest ubuntu-24.04-arm macos-latest'

jobs:
  discover:
    name: Discover matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        name: Build {os × channel × journey} matrix
        run: |
          channels="${{ inputs.channel }}"
          [ -z "$channels" ] && channels="$DEFAULT_CHANNELS"
          matrix="$(bash ./scripts/dx-e2e-matrix.sh "$OSES" "$channels")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Resolved matrix:"; echo "$matrix" | python3 -m json.tool

  dx-e2e:
    name: DX (${{ matrix.os }} · ${{ matrix.channel }} · ${{ matrix.journey }})
    needs: discover
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # raises tx3up's GitHub rate limit
    steps:
      - uses: actions/checkout@v4

      - name: Install tx3up
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/tx3-lang/tx3up/releases/latest/download/tx3up-installer.sh | sh

      - name: Put tx3up on PATH
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache channel toolchain
        uses: actions/cache@v4
        with:
          path: ~/.tx3/${{ matrix.channel }}
          key: tx3-${{ runner.os }}-${{ runner.arch }}-${{ matrix.channel }}-${{ hashFiles(format('manifest-{0}.json', matrix.channel)) }}

      - name: Run DX e2e
        run: ./e2e/run.sh --channel "${{ matrix.channel }}" --journey "${{ matrix.journey }}" --no-isolate --artifacts-dir "$RUNNER_TEMP/dx-e2e-artifacts"

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dx-e2e-${{ matrix.os }}-${{ matrix.channel }}-${{ matrix.journey }}
          path: ${{ runner.temp }}/dx-e2e-artifacts
          if-no-files-found: ignore
          retention-days: 7
