name: DX E2E

# One job per channel, each an {os × journey} matrix. The shared per-cell steps
# (install the channel via tx3up, cache it, run one journey) live in the local
# composite action .github/actions/dx-e2e-run.
#
#   - stable: the offline scaffold gate + lang-surface journeys. Edge journeys
#     whose `#@ min-tx3c` exceeds stable's tx3c install + skip (green), and
#     auto-run once the feature graduates to stable.
#   - beta: edge-feature journeys (e.g. 02-lang-tour's tuples), plus the devnet
#     round-trip (04) and the invoke arg-type journey (05). Both currently *fail*
#     on released channels (known, tracked trix gaps fixed on main but unreleased)
#     — intentionally red, not tolerated xfails; each goes green once its fix
#     ships to a channel.
#
# Compat lives in one place: the journey's `#@ min-tx3c` header, enforced by the
# runner's skip gate. Native runners only — a DX test must exercise the real
# per-platform install, which a Linux container can't.
#
# Adding a journey: add it to `stable`'s journey list (always); if it exercises a
# beta-only feature, also add it to `beta`'s list.

on:
  push:
    branches: [main]
    paths:
      - 'manifest-*.json'
      - 'e2e/**'
      - '.github/workflows/dx-e2e.yml'
      - '.github/actions/dx-e2e-run/**'
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'          # nightly drift check

permissions:
  contents: read

jobs:
  stable:
    name: stable (${{ matrix.os }} · ${{ matrix.journey }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        journey: [01-basic-init, 02-lang-tour, 03-lang-edge]   # comprehensive: every journey
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dx-e2e-run
        with:
          channel: stable
          journey: ${{ matrix.journey }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  beta:
    name: beta (${{ matrix.os }} · ${{ matrix.journey }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        # edge-feature journeys + the devnet round-trip (04) and the invoke
        # arg-type journey (05). 04 and 05 fail on released channels until their
        # trix fixes ship (intentionally red, not xfails).
        journey: [02-lang-tour, 03-lang-edge, 04-devnet-roundtrip, 05-invoke]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dx-e2e-run
        with:
          channel: beta
          journey: ${{ matrix.journey }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
