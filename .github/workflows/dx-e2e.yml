name: DX E2E

# A `warmup` job primes each channel's toolchain cache once per OS, then one job
# per channel runs an {os × journey} matrix (gated on `needs: warmup`, so cells
# start warm). The shared per-cell steps (install the channel via tx3up, cache
# it, run one journey — or just warm the cache) live in the local composite
# action .github/actions/dx-e2e-run.
#
#   - stable: the offline scaffold gate + lang-surface journeys. Edge journeys
#     whose `#@ min-tx3c` exceeds stable's tx3c install + skip (green), and
#     auto-run once the feature graduates to stable.
#   - beta: edge-feature and runtime journeys — tuples (02), the devnet
#     round-trip (04), and the invoke journey (05) — that need a beta-channel
#     install to exercise their feature.
#
# Compat lives in one place: the journey's `#@ min-tx3c` header, enforced by the
# runner's skip gate. Native runners only — a DX test must exercise the real
# per-platform install, which a Linux container can't.
#
# Adding a journey: add it to `stable`'s journey list (always); if it exercises a
# beta-only feature, also add it to `beta`'s list.

on:
  push:
    branches: [main]
    paths:
      - 'manifest-*.json'
      - 'e2e/**'
      - '.github/workflows/dx-e2e.yml'
      - '.github/actions/dx-e2e-run/**'
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'          # nightly drift check

permissions:
  contents: read

jobs:
  # Prime each channel's toolchain cache once per OS before the {os × journey}
  # matrices run. Without this, the journey cells for a given (os, channel) share
  # one cache key and, on a cold cache, cold-install the same channel
  # concurrently — a thundering herd that trips the releases-API rate limit and
  # is the main source of flake. Gating the matrices on `needs: warmup` means
  # they start with a warm cache and skip the install entirely.
  warmup:
    name: warmup (${{ matrix.os }} · ${{ matrix.channel }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dx-e2e-run
        with:
          channel: ${{ matrix.channel }}
          warmup-only: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

  stable:
    name: stable (${{ matrix.os }} · ${{ matrix.journey }})
    needs: warmup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # a cache-miss burst of concurrent `tx3up install`s trips the releases-API rate limit
      max-parallel: 3
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        journey: [01-basic-init, 02-lang-tour, 03-lang-edge, 05-invoke]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dx-e2e-run
        with:
          channel: stable
          journey: ${{ matrix.journey }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  beta:
    name: beta (${{ matrix.os }} · ${{ matrix.journey }})
    needs: warmup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        # edge-feature journeys plus the runtime journeys: the devnet
        # round-trip (04) and invoke (05).
        journey: [02-lang-tour, 03-lang-edge, 04-devnet-roundtrip, 05-invoke]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dx-e2e-run
        with:
          channel: beta
          journey: ${{ matrix.journey }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
